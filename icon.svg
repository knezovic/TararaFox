<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Variant B: logo-inspired mark — two interlocking links woven together,
       teal over bronze on the left crossing, bronze over teal on the right
       (a simplified take on the TararaLogo's two-tone interlock). -->
  <defs>
    <linearGradient id="tb-teal" x1="28" y1="16" x2="68" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#46a0b4"/>
      <stop offset="1" stop-color="#123e47"/>
    </linearGradient>
    <linearGradient id="tb-bronze" x1="28" y1="40" x2="68" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dca15a"/>
      <stop offset="1" stop-color="#85501f"/>
    </linearGradient>
    <clipPath id="tb-cross"><rect x="49" y="42" width="18" height="15"/></clipPath>
  </defs>
  <g fill="none" stroke-width="11" stroke-linejoin="round">
    <!-- bronze link (lower), then teal link (upper) over it... -->
    <path d="M48 40 L68 60 L48 80 L28 60 Z" stroke="url(#tb-bronze)"/>
    <path d="M48 16 L68 36 L48 56 L28 36 Z" stroke="url(#tb-teal)"/>
    <!-- ...then redraw the bronze link's right crossing on top, for the weave -->
    <path d="M48 40 L68 60 L48 80 L28 60 Z" stroke="url(#tb-bronze)" clip-path="url(#tb-cross)"/>
  </g>
</svg>
